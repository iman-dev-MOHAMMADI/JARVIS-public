name = "jarvis-mohammadi-v2"
main = "index.js"
compatibility_date = "2024-11-01"

# برای اینکه import از .md کار کنه - خیلی مهم
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

# KV برای حافظه
[[kv_namespaces]]
binding = "JARVIS_KV"
# id رو بعد از ساخت KV از داشبورد یا CLI پر کن
id = "REPLACE_WITH_YOUR_KV_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_ID"

[vars]
MODEL = "google/gemma-3-27b-it:free"

# اگر می‌خوای AI Gateway یا چیز دیگه اضافه کنی اینجا
